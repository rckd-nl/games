<!DOCTYPE html>
<html>
<head><title>Firebase Test</title></head>
<body>
<h2>Firebase Connection Test</h2>
<div id="log" style="font-family:monospace;white-space:pre;padding:20px"></div>
<script type="module">
const log = (msg) => {
  document.getElementById('log').textContent += msg + '\n';
  console.log(msg);
};

log('1. Loading Firebase...');

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const config = {
  apiKey: "AIzaSyADtUD_GrSbfzss3CeO79VbDeAOmIwxGfI",
  authDomain: "didcot-dogs.firebaseapp.com",
  databaseURL: "https://didcot-dogs-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "didcot-dogs",
  storageBucket: "didcot-dogs.firebasestorage.app",
  messagingSenderId: "1087104000704",
  appId: "1:1087104000704:web:13dbe3478e3a0cc9e5c325"
};

try {
  log('2. Initialising app...');
  const app = initializeApp(config);
  log('3. Getting database...');
  const db = getDatabase(app);
  log('4. Writing test value...');
  await set(ref(db, 'test/ping'), { time: Date.now(), msg: 'hello' });
  log('5. Write succeeded. Reading back...');
  const snap = await get(ref(db, 'test/ping'));
  log('6. Read result: ' + JSON.stringify(snap.val()));
  log('✓ FIREBASE WORKING CORRECTLY');
} catch(e) {
  log('✗ ERROR: ' + e.message);
  log('Stack: ' + e.stack);
}
</script>
</body>
</html>
