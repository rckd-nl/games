<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Didcot Dogs v1.1</title>
  <link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">
  <link rel="stylesheet" href="./css/didcot-dogs.v1.css" />
</head>
<body>
  <div id="app">
    <div id="game-shell">
      <div id="top-bar">
        <div id="title-block">
          <div id="game-title">Didcot Dogs</div>
          <div id="game-subtitle">Private two-player route game prototype v1.1</div>
        </div>
        <button id="fullscreen-btn" type="button">Full screen</button>
      </div>

      <aside id="left-panel">
        <div class="panel-title">Cards</div>
        <div class="panel-section">
          <div class="placeholder-card">Draw pile</div>
        </div>
        <div class="panel-section">
          <div class="placeholder-card">Discard pile</div>
        </div>
        <div class="panel-section">
          <div class="placeholder-card">Hand will go here</div>
        </div>
        <div id="left-debug"></div>
      </aside>

      <main id="board-wrap">
        <div id="board-svg-host" aria-label="Didcot Dogs board"></div>
      </main>

      <aside id="right-panel">
        <div class="panel-title">Destinations</div>
        <div id="right-destinations" class="placeholder-stack"></div>
      </aside>

      <div id="status-chip">Loading board…</div>
    </div>
  </div>

  <script src="./js/app.v1.js"></script>
</body>
</html>
