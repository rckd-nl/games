<!DOCTYPE html>
<html lang="en">
<head>
<!--
  DOGS OF DIDCOT
  Version: v4.0 / Turn 7
  Full rewrite from spec.
  Warm chaotic map aesthetic. Professor Minty.
  Cream/parchment bg. Full card hand strip.
  Firebase: dogs-of-didcot-27ae6
  
  CHANGELOG
  v4.0 (turn 7)
    - Complete rewrite of JS from spec
    - Warm/chaotic hand-drawn map aesthetic
    - Professor Minty font throughout
    - Card hand strip with actual card graphics
    - Big dog portraits front and centre
    - Full 2-6 player lobby
    - Mystery events, poop, zoomies all included
    - Draw-2-pick-1 mechanic
    - Phase-driven lobby (waiting/countdown/playing)
    - Single Firebase subscriber per client
    - Route colour badges on board
    - Token formation positioning for multi-player
    - Session resume via sessionStorage
-->
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Dogs of Didcot</title>
<link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">
<style>
/* ═══════════════════════════════════════════════
   DOGS OF DIDCOT — v4.0
   Warm chaotic map aesthetic. Professor Minty.
   Cream/parchment bg, loud ink colours, card hand.
═══════════════════════════════════════════════ */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --cream:   #f4f0e4;
  --cream2:  #ede8d8;
  --paper:   #e8e2ce;
  --ink:     #1a1208;
  --ink2:    #2e2510;
  --red:     #c8321a;
  --red2:    #a02010;
  --gold:    #c9820a;
  --gold2:   #a56808;
  --green:   #2a6e3a;
  --blue:    #1a3e7c;
  --muted:   #6b5e42;
  --border:  #b8a882;
  --shadow:  rgba(26,18,8,0.18);

  --font-display: "professor-minty", sans-serif;
  --font-body:    "professor-minty", sans-serif;

  /* Route colours — vivid ink */
  --rc-red:    #c8321a;
  --rc-orange: #d4620a;
  --rc-blue:   #1a4eb0;
  --rc-green:  #1e7a38;
  --rc-black:  #1a1208;
  --rc-pink:   #b82878;
  --rc-yellow: #c8a008;

  /* Card colour gradients */
  --card-red:    linear-gradient(160deg,#e87060 0%,#c8321a 100%);
  --card-orange: linear-gradient(160deg,#f0a060 0%,#d4620a 100%);
  --card-blue:   linear-gradient(160deg,#6090d8 0%,#1a4eb0 100%);
  --card-green:  linear-gradient(160deg,#60b870 0%,#1e7a38 100%);
  --card-black:  linear-gradient(160deg,#606060 0%,#1a1208 100%);
  --card-pink:   linear-gradient(160deg,#e880b8 0%,#b82878 100%);
  --card-yellow: linear-gradient(160deg,#f0d060 0%,#c8a008 100%);
  --card-rainbow:linear-gradient(135deg,#e87060,#f0d060,#60b870,#6090d8,#e880b8);

  /* Player colours */
  --pc-red:    #c8321a;
  --pc-orange: #d4620a;
  --pc-yellow: #c8a008;
  --pc-green:  #1e7a38;
  --pc-teal:   #1a7a6a;
  --pc-blue:   #1a4eb0;
  --pc-purple: #7a28a8;
  --pc-pink:   #b82878;
  --pc-white:  #e8e2ce;
  --pc-black:  #1a1208;
}

html,body {
  height:100%;
  background: var(--cream);
  color: var(--ink);
  font-family: var(--font-body);
  overflow: hidden;
}

/* ── GRAIN OVERLAY ── */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:9999;
  opacity:0.6;
}

/* ══════════════════════════════════════
   SCREENS
══════════════════════════════════════ */
.screen {
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .3s;z-index:100;
}
.screen.active{opacity:1;pointer-events:all}

/* ══════════════════════════════════════
   ROOM SCREEN
══════════════════════════════════════ */
#screen-room {
  flex-direction:column;
  background: var(--cream);
  z-index:200;
}

.room-bg {
  position:absolute;inset:0;overflow:hidden;
}
.room-bg-stripe {
  position:absolute;height:100%;width:60px;
  transform:skewX(-12deg);
  opacity:.07;
}
.room-bg-stripe:nth-child(1){background:var(--red);left:10%}
.room-bg-stripe:nth-child(2){background:var(--blue);left:25%}
.room-bg-stripe:nth-child(3){background:var(--green);left:42%}
.room-bg-stripe:nth-child(4){background:var(--gold);left:60%}
.room-bg-stripe:nth-child(5){background:var(--rc-pink);left:76%}

.room-content {
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  gap:20px;width:min(420px,92vw);
}

.room-masthead {
  text-align:center;margin-bottom:8px;
}
.room-title {
  font-family:var(--font-display);
  font-size:clamp(3.5rem,9vw,6.5rem);
  font-weight:700;
  color:var(--ink);
  line-height:.9;
  letter-spacing:-.02em;
  text-shadow: 3px 3px 0 var(--red2), 6px 6px 0 rgba(26,18,8,.1);
}
.room-sub {
  font-family:var(--font-body);
  font-size:.95rem;
  color:var(--muted);
  margin-top:6px;
  letter-spacing:.06em;
  text-transform:uppercase;
}

/* Falling dogs canvas behind room screen */
#dogs-canvas {
  position:fixed;inset:0;
  pointer-events:none;z-index:1;
}

.room-card {
  width:100%;
  background:var(--paper);
  border:2px solid var(--border);
  border-radius:12px;
  padding:20px;
  box-shadow: 4px 4px 0 var(--border), 8px 8px 0 rgba(26,18,8,.06);
}

.room-btn-create {
  width:100%;min-height:58px;
  background:var(--red);
  border:2px solid var(--red2);
  border-radius:10px;
  color:#fff;
  font-family:var(--font-display);
  font-size:1.5rem;
  font-weight:700;
  cursor:pointer;
  box-shadow:3px 3px 0 var(--red2);
  transition:transform .1s,box-shadow .1s;
  letter-spacing:.03em;
}
.room-btn-create:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--red2)}
.room-btn-create:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--red2)}

.room-divider {
  display:flex;align-items:center;gap:12px;
  color:var(--muted);font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;
}
.room-divider::before,.room-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}

.room-join-row{display:flex;gap:8px}
.room-code-input {
  flex:1;min-height:52px;
  background:var(--cream);
  border:2px solid var(--border);border-radius:10px;
  color:var(--ink);
  font-family:var(--font-display);
  font-size:1.8rem;font-weight:700;
  text-align:center;letter-spacing:.3em;
  outline:none;
  transition:border-color .15s;
}
.room-code-input:focus{border-color:var(--red)}
.room-code-input::placeholder{color:var(--border);font-size:1.1rem;letter-spacing:.15em}
.room-btn-join {
  min-height:52px;padding:0 20px;
  background:var(--ink);
  border:2px solid var(--ink2);border-radius:10px;
  color:var(--cream);
  font-family:var(--font-display);
  font-size:1.1rem;font-weight:700;
  cursor:pointer;
  box-shadow:2px 2px 0 var(--ink2);
  transition:transform .1s,box-shadow .1s;
  white-space:nowrap;
}
.room-btn-join:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink2)}
.room-btn-join:active{transform:translate(1px,1px);box-shadow:0 0 0 var(--ink2)}
.room-error{color:var(--red);font-size:.85rem;text-align:center;min-height:18px;margin-top:4px}

/* ══════════════════════════════════════
   LOBBY OVERLAY
   Injected by JS — full screen over room
══════════════════════════════════════ */
#lobby-overlay {
  position:fixed;inset:0;z-index:300;
  background:var(--cream);
  display:none;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
#lobby-overlay.open{display:block}

.lobby-wrap {
  min-height:100%;
  display:flex;align-items:flex-start;justify-content:center;
  padding:32px 16px 48px;
}
.lobby-inner {
  width:min(700px,100%);
  display:flex;flex-direction:column;gap:24px;
}

.lobby-header{text-align:center}
.lobby-eyebrow {
  font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;
}
.lobby-title {
  font-family:var(--font-display);
  font-size:clamp(2.4rem,6vw,4rem);
  font-weight:700;color:var(--ink);
  line-height:.95;
  text-shadow:2px 2px 0 rgba(26,18,8,.12);
}

.lobby-section-label {
  font-size:.78rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);margin-bottom:10px;
}

/* Dog picker */
.lobby-dog-grid {
  display:grid;grid-template-columns:repeat(6,1fr);gap:10px;
}
@media(max-width:500px){.lobby-dog-grid{grid-template-columns:repeat(3,1fr)}}
.lobby-dog-btn {
  aspect-ratio:1;border-radius:14px;
  border:3px solid var(--border);
  background:var(--paper);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;padding:8px 4px;
  transition:transform .12s,border-color .12s,box-shadow .12s;
  position:relative;overflow:hidden;
}
.lobby-dog-btn img{width:70%;height:70%;object-fit:contain}
.lobby-dog-btn .dog-name{font-size:.68rem;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.lobby-dog-btn:hover:not(.taken):not(.sel){transform:translateY(-3px);border-color:var(--red);box-shadow:0 6px 0 var(--border)}
.lobby-dog-btn.sel{border-color:var(--red);background:#fff8f4;transform:translateY(-2px);box-shadow:0 4px 0 var(--red2)}
.lobby-dog-btn.taken{opacity:.32;cursor:not-allowed}
.lobby-dog-btn .taken-stamp{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:1.4rem;color:var(--red);
  transform:rotate(-20deg);opacity:.8;
}

/* Colour picker */
.lobby-colour-grid {
  display:grid;grid-template-columns:repeat(5,1fr);gap:8px;
}
.lobby-colour-btn {
  height:48px;border-radius:8px;
  border:3px solid transparent;
  cursor:pointer;
  font-family:var(--font-display);font-size:.75rem;font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;
  transition:transform .1s,border-color .1s;
}
.lobby-colour-btn:hover:not(.taken){transform:scale(1.06)}
.lobby-colour-btn.sel{border-color:var(--ink)!important;transform:scale(1.06);box-shadow:0 0 0 2px rgba(26,18,8,.3)}
.lobby-colour-btn.taken{opacity:.28;cursor:not-allowed;text-decoration:line-through}

/* Number pickers */
.lobby-num-row{display:flex;flex-wrap:wrap;gap:8px}
.lobby-num-btn {
  width:48px;height:48px;border-radius:8px;
  border:2px solid var(--border);background:var(--paper);
  font-family:var(--font-display);font-size:1.3rem;font-weight:700;color:var(--ink);
  cursor:pointer;
  transition:background .1s,border-color .1s,transform .1s;
}
.lobby-num-btn:hover{background:var(--cream2);border-color:var(--muted)}
.lobby-num-btn.sel{background:var(--ink);color:var(--cream);border-color:var(--ink2);transform:scale(1.08)}
.lobby-num-btn.dim{opacity:.28;cursor:not-allowed}

/* Lobby action row */
.lobby-actions{display:flex;justify-content:space-between;gap:12px;margin-top:8px}
.lobby-btn-back {
  min-height:50px;padding:0 20px;border-radius:10px;
  border:2px solid var(--border);background:var(--paper);
  font-family:var(--font-display);font-size:1rem;color:var(--muted);cursor:pointer;
  transition:background .12s;
}
.lobby-btn-back:hover{background:var(--cream2)}
.lobby-btn-confirm {
  flex:1;min-height:50px;border-radius:10px;
  background:var(--red);border:2px solid var(--red2);
  color:#fff;font-family:var(--font-display);font-size:1.1rem;font-weight:700;
  cursor:pointer;box-shadow:2px 2px 0 var(--red2);
  transition:transform .1s,box-shadow .1s,opacity .12s;
}
.lobby-btn-confirm:hover:not(:disabled){transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--red2)}
.lobby-btn-confirm:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}

/* Summary pill */
.lobby-game-info{
  display:flex;gap:10px;flex-wrap:wrap;font-size:.82rem;color:var(--muted);
}
.lobby-info-pill{
  padding:4px 12px;border-radius:99px;
  border:1.5px solid var(--border);background:var(--paper);
  font-weight:700;color:var(--ink);
}

/* Waiting lobby */
.lobby-waiting-code {
  font-family:var(--font-display);
  font-size:clamp(3.5rem,12vw,6rem);
  font-weight:700;color:var(--red);
  letter-spacing:.2em;text-align:center;
  text-shadow:3px 3px 0 var(--red2);
}
.lobby-waiting-slots{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.lobby-slot-filled,.lobby-slot-empty{
  width:96px;padding:12px 8px;border-radius:12px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  font-size:.78rem;font-weight:700;
}
.lobby-slot-filled{border:2px solid}
.lobby-slot-empty{border:2px dashed var(--border);background:var(--paper);color:var(--muted)}
.lobby-slot-filled img{width:52px;height:52px;object-fit:contain;border-radius:50%;border:3px solid rgba(0,0,0,.15);background:rgba(255,255,255,.8)}
.lobby-slot-badge{
  font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;
  padding:2px 8px;border-radius:99px;background:rgba(0,0,0,.15);
}
.lobby-waiting-sub{
  font-size:.9rem;color:var(--muted);text-align:center;
}
.waiting-dots{display:flex;gap:8px;justify-content:center}
.waiting-dot{
  width:10px;height:10px;border-radius:50%;background:var(--muted);
  animation:dotpulse 1.4s ease-in-out infinite;
}
.waiting-dot:nth-child(2){animation-delay:.2s}
.waiting-dot:nth-child(3){animation-delay:.4s}
@keyframes dotpulse{
  0%,100%{transform:scale(.65);opacity:.35}
  50%{transform:scale(1.1);opacity:1}
}

.lobby-start-btn {
  width:100%;min-height:60px;
  background:var(--green);border:2px solid #1a5228;
  border-radius:12px;color:#fff;
  font-family:var(--font-display);font-size:1.4rem;font-weight:700;
  cursor:pointer;box-shadow:3px 3px 0 #1a5228;
  transition:transform .1s,box-shadow .1s;
}
.lobby-start-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 #1a5228}

/* ══════════════════════════════════════
   TURN BANNER
══════════════════════════════════════ */
#turn-banner {
  position:fixed;top:12px;left:50%;
  transform:translateX(-50%) translateY(-80px);
  background:var(--ink);color:var(--cream);
  font-family:var(--font-display);font-size:1.1rem;font-weight:700;
  padding:10px 28px;border-radius:99px;
  box-shadow:3px 3px 0 rgba(26,18,8,.25);
  z-index:500;letter-spacing:.04em;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;pointer-events:none;
}
#turn-banner.show{transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════════════
   GAME SCREEN
══════════════════════════════════════ */
#screen-game {
  flex-direction:row;
  align-items:stretch;
  padding:0;z-index:50;
  background:var(--cream2);
}

/* ── BOARD ── */
#board-area {
  flex:1;position:relative;
  overflow:hidden;
  background:
    radial-gradient(ellipse at center, #f8f4e8 0%, var(--cream2) 100%);
  border-right:2px solid var(--border);
}
#board-svg-host{
  width:100%;height:100%;display:block;
}
#board-svg-host svg{
  width:100%;height:100%;display:block;
}
/* Override SVG node colours so we can style them */
#board-svg-host #Nodes circle{
  fill:#fff !important;
  stroke:#1a1208 !important;
  stroke-width:4 !important;
}
#board-svg-host text{
  font-family:var(--font-display) !important;
  fill:var(--ink) !important;
  pointer-events:none;
}
/* Route base style */
#board-svg-host path.route-base{
  vector-effect:non-scaling-stroke;
}

/* SVG state classes */
.route-eligible{
  animation:eligiblePulse .9s ease-in-out infinite;
  filter:drop-shadow(0 0 8px rgba(200,50,26,.85));
}
.route-claimed{
  stroke-width:11 !important;
  animation:claimedShimmer 1.2s ease-in-out infinite;
}
@keyframes eligiblePulse{
  0%,100%{stroke-opacity:1}50%{stroke-opacity:.6}
}
@keyframes claimedShimmer{
  0%,100%{stroke-opacity:1;filter:drop-shadow(0 0 4px rgba(255,255,255,.3))}
  50%{stroke-opacity:.85;filter:drop-shadow(0 0 8px rgba(255,255,255,.5))}
}
.node-target-pulse{
  animation:targetPulse 1.3s linear infinite !important;
}
@keyframes targetPulse{
  0%  {fill:#c8321a !important;stroke:#c8321a !important}
  20% {fill:#d4620a !important;stroke:#d4620a !important}
  40% {fill:#c8a008 !important;stroke:#c8a008 !important}
  60% {fill:#1e7a38 !important;stroke:#1e7a38 !important}
  80% {fill:#1a4eb0 !important;stroke:#1a4eb0 !important}
  100%{fill:#b82878 !important;stroke:#b82878 !important}
}
.mystery-ring{animation:mystRing 1.5s ease-in-out infinite}
@keyframes mystRing{
  0%,100%{opacity:.45;transform:scale(1)}
  50%{opacity:1;transform:scale(1.2)}
}

/* ── LEFT PANEL ── */
#left-panel {
  width:260px;flex-shrink:0;
  background:var(--paper);
  border-right:2px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;padding:0;
}
.panel-header{
  padding:14px 16px 10px;
  border-bottom:2px solid var(--border);
  background:var(--cream2);
}
.panel-header h2{
  font-family:var(--font-display);
  font-size:1.4rem;font-weight:700;
  color:var(--ink);letter-spacing:.02em;
}
.panel-body{
  flex:1;overflow-y:auto;padding:14px 14px 8px;
  display:flex;flex-direction:column;gap:14px;
}
.panel-section-lbl{
  font-size:.72rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);margin-bottom:6px;
}

/* Player cards in left panel */
.player-card {
  border-radius:10px;border:2px solid var(--border);
  background:var(--cream);padding:10px 12px;
  display:flex;align-items:center;gap:10px;
  transition:border-color .2s,background .2s;
  border-left-width:4px;
}
.player-card.my-turn{border-color:var(--green) !important;background:#f0faf2}
.player-card.act-turn{border-color:var(--red) !important;background:#fff8f4;
  box-shadow:0 0 0 2px rgba(200,50,26,.12)}
.pc-portrait{
  width:38px;height:38px;border-radius:8px;
  overflow:hidden;flex-shrink:0;
  background:rgba(255,255,255,.8);
  border:1.5px solid var(--border);
}
.pc-portrait img{width:100%;height:100%;object-fit:contain}
.pc-info{flex:1;min-width:0}
.pc-name{font-family:var(--font-display);font-size:.9rem;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-meta{font-size:.7rem;color:var(--muted)}
.pc-turn-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--red);flex-shrink:0;
  animation:dotpulse 1s ease-in-out infinite;
}

/* Destination info */
.dest-box{
  background:var(--cream);border:2px solid var(--border);
  border-radius:10px;padding:10px 12px;border-left:4px solid var(--red);
}
.dest-box-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.dest-box-title{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--red)}
.dest-box-desc{font-size:.75rem;color:var(--muted);line-height:1.45;margin-top:4px}
.dest-box-prog{font-size:.7rem;color:var(--muted);margin-top:5px}

/* Draw button */
.btn-draw{
  width:100%;min-height:72px;border-radius:10px;
  background:var(--ink);border:2px solid var(--ink2);
  color:var(--cream);
  font-family:var(--font-display);
  cursor:pointer;box-shadow:2px 2px 0 var(--ink2);
  transition:transform .1s,box-shadow .1s,opacity .12s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
}
.btn-draw:hover:not(:disabled){transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink2)}
.btn-draw:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}

  return player.chain[idx];
}

function countCards(hand) {
  return hand.reduce((acc,c)=>{acc[c]=(acc[c]||0)+1;return acc;},{});
}

function buildDeck() {
  const r = G.rulesData;
  const cols = r.drawColours || [];
  const cpc = r.deck?.copiesPerColour ?? 8;
  const rc  = r.deck?.rainbowCount ?? 6;
  return shuf([...cols.flatMap(c=>Array(cpc).fill(c)), ...Array(rc).fill("rainbow")]);
}

// ─── Falling dogs canvas ─────────────────────────────────────────────────────
function initFallingDogs() {
  let cv = $("dogs-canvas");
  if(!cv) { cv=document.createElement("canvas"); cv.id="dogs-canvas"; cv.style.cssText="position:fixed;inset:0;pointer-events:none;z-index:1"; document.body.appendChild(cv); }
  const ctx = cv.getContext("2d");
  const resize = () => { cv.width=innerWidth; cv.height=innerHeight; };
  resize(); window.addEventListener("resize",resize);
  const imgs = DOGS.map(d=>{ const i=new Image(); i.src=d.img; return i; });
  const dogs = Array.from({length:16},()=>({
    x:Math.random()*innerWidth, y:Math.random()*-innerHeight,
    spd:.4+Math.random()*1.2, sz:32+Math.random()*36,
    rot:(Math.random()-.5)*.06, ang:0,
    sw:(Math.random()-.5)*.6, swp:Math.random()*Math.PI*2,
    img:imgs[~~(Math.random()*imgs.length)]
  }));
  (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    dogs.forEach(d=>{
      d.y+=d.spd; d.ang+=d.rot; d.swp+=.018; d.x+=Math.sin(d.swp)*d.sw;
      if(d.y>cv.height+60){d.y=-60;d.x=Math.random()*cv.width}
      ctx.save(); ctx.globalAlpha=.22; ctx.translate(d.x,d.y); ctx.rotate(d.ang);
      ctx.drawImage(d.img,-d.sz/2,-d.sz/2,d.sz,d.sz);
      ctx.restore();
    });
    requestAnimationFrame(draw);
  })();
}

// ─── Board pan/zoom ───────────────────────────────────────────────────────────
function applyBoardView() {
  const svg = G.svg; if(!svg||!G.boardView.base) return;
  const b=G.boardView.base, s=G.boardView.scale;
  const vw=b.w/s, vh=b.h/s;
  const mx=(b.w-vw)/2, my=(b.h-vh)/2;
  G.boardView.panX=Math.max(-mx,Math.min(mx,G.boardView.panX));
  G.boardView.panY=Math.max(-my,Math.min(my,G.boardView.panY));
  const cx=b.x+b.w/2, cy=b.y+b.h/2;
  svg.setAttribute("viewBox",`${cx-vw/2+G.boardView.panX} ${cy-vh/2+G.boardView.panY} ${vw} ${vh}`);
}
function resetView() { G.boardView.scale=1;G.boardView.panX=0;G.boardView.panY=0;applyBoardView(); }

function setupGestures() {
  const bw = $("board-area"); if(!bw) return;
  let mode=null,sp=null,spi=null;
  const svgPt=(cx,cy)=>{ const r=bw.getBoundingClientRect(),vb=G.svg.viewBox.baseVal; return {x:vb.x+(cx-r.left)*vb.width/r.width,y:vb.y+(cy-r.top)*vb.height/r.height}; };
  bw.addEventListener("touchstart",e=>{
    if(e.touches.length===1){mode="pan";sp={fc:{x:e.touches[0].clientX,y:e.touches[0].clientY},px:G.boardView.panX,py:G.boardView.panY};}
    if(e.touches.length===2){mode="pinch";const dx=e.touches[1].clientX-e.touches[0].clientX,dy=e.touches[1].clientY-e.touches[0].clientY,mx=(e.touches[0].clientX+e.touches[1].clientX)/2,my2=(e.touches[0].clientY+e.touches[1].clientY)/2;spi={dist:Math.hypot(dx,dy),sc:G.boardView.scale,px:G.boardView.panX,py:G.boardView.panY,mid:svgPt(mx,my2),mcl:{x:mx,y:my2}};}
  },{passive:false});
  bw.addEventListener("touchmove",e=>{
    e.preventDefault();
    if(mode==="pan"&&e.touches.length===1&&sp){const b=G.boardView.base,r=bw.getBoundingClientRect(),spx=(b.w/G.boardView.scale)/r.width;G.boardView.panX=sp.px-(e.touches[0].clientX-sp.fc.x)*spx;G.boardView.panY=sp.py-(e.touches[0].clientY-sp.fc.y)*((b.h/G.boardView.scale)/r.height);applyBoardView();}
    if(mode==="pinch"&&e.touches.length===2&&spi){const dx=e.touches[1].clientX-e.touches[0].clientX,dy=e.touches[1].clientY-e.touches[0].clientY,nd=Math.hypot(dx,dy),ns=Math.max(1,Math.min(3,spi.sc*(nd/spi.dist))),mx=(e.touches[0].clientX+e.touches[1].clientX)/2,my2=(e.touches[0].clientY+e.touches[1].clientY)/2;const b=G.boardView.base,r=bw.getBoundingClientRect();G.boardView.scale=ns;G.boardView.panX=spi.mid.x-(b.x+b.w/2)-(mx-r.left-r.width/2)*(b.w/ns)/r.width;G.boardView.panY=spi.mid.y-(b.y+b.h/2)-(my2-r.top-r.height/2)*(b.h/ns)/r.height;applyBoardView();}
  },{passive:false});
  bw.addEventListener("touchend",e=>{if(e.touches.length===0){mode=null;sp=null;spi=null;}else if(e.touches.length===1){mode="pan";sp={fc:{x:e.touches[0].clientX,y:e.touches[0].clientY},px:G.boardView.panX,py:G.boardView.panY};spi=null;}});
}

// ─── SVG helpers ─────────────────────────────────────────────────────────────
function nodeCenter(id) {
  const el = G.svg.querySelector(`#${CSS.escape(id)}`); if(!el) throw new Error(`Node ${id} not found`);
  if(el.tagName.toLowerCase()==="circle") return {x:+el.getAttribute("cx"),y:+el.getAttribute("cy")};
  const b=el.getBBox(); return {x:b.x+b.width/2,y:b.y+b.height/2};
}
function ensureLayer(id,top=false) {
  let l=G.svg.querySelector(`#${CSS.escape(id)}`);
  if(!l){l=mkSvg("g",{id});G.svg.appendChild(l);}
  else if(top) G.svg.appendChild(l);
  return l;
}

// ─── Token rendering ──────────────────────────────────────────────────────────
function renderTokens(state) {
  const layer = ensureLayer("token-layer",true);
  const players = Object.keys(state.players||{});
  // Group by node
  const byNode = {};
  players.forEach(id=>{ const p=getPlayer(state,id); if(!p) return; const n=p.currentNode; if(!byNode[n])byNode[n]=[]; byNode[n].push(id); });

  players.forEach(id => {
    const p=getPlayer(state,id); if(!p) return;
    const dog=DOGS.find(d=>d.id===id);
    const playerColHex = pcHex(state.characterSelections?.[id]?.colour);
    const node=p.currentNode, group=byNode[node]||[id];
    const idx=group.indexOf(id), total=group.length;
    const c=nodeCenter(node);
    const r=20,angle=total===1?0:(-Math.PI/2)+(2*Math.PI*idx/total);
    const x=total===1?c.x:c.x+r*Math.cos(angle);
    const y=total===1?c.y:c.y+r*Math.sin(angle);

    let g=G.svg.querySelector(`#tok-${id}`);
    if(!g){
      g=mkSvg("g",{id:`tok-${id}`}); layer.appendChild(g);
      const circ=mkSvg("circle",{r:"18",fill:"#fff","stroke-width":"4"});
      circ.style.stroke=playerColHex;
      const img=mkSvg("image",{x:"-14",y:"-14",width:"28",height:"28","clip-path":`url(#tok-clip-${id})`});
      img.setAttribute("href",dog?.img||"");
      // Clip path
      let defs=G.svg.querySelector("defs"); if(!defs){defs=mkSvg("defs");G.svg.insertBefore(defs,G.svg.firstChild);}
      if(!defs.querySelector(`#tok-clip-${id}`)){const cp=mkSvg("clipPath",{id:`tok-clip-${id}`});cp.appendChild(mkSvg("circle",{cx:"0",cy:"0",r:"14"}));defs.appendChild(cp);}
      g.appendChild(circ); g.appendChild(img);
    }
    g.setAttribute("transform",`translate(${x},${y})`);
  });
  // Remove stale tokens
  layer.querySelectorAll("[id^='tok-']").forEach(el=>{
    const id=el.id.replace("tok-","");
    if(!players.includes(id)) el.remove();
  });
}

// ─── Route rendering ──────────────────────────────────────────────────────────
function renderRoutes(state) {
  if(!G.rulesData||!state.routes) return;
  const myP = myPlayer(state);
  const myNode = myP?.currentNode;
  const myPrev = myP?.previousNode;
  const isMine = isMyTurn(state);

  Object.keys(G.rulesData.routes||{}).forEach(rid=>{
    const el=G.svg.querySelector(`#${CSS.escape(rid)}`); if(!el) return;
    const rs=state.routes[rid]; if(!rs) return;
    el.classList.remove("route-eligible","route-claimed");
    el.style.strokeWidth="8";
    el.style.stroke=ROUTE_COLOUR_HEX[rs.colour]||"#555";
    el.style.strokeOpacity="0.7";
    el.style.cursor="default";

    if(rs.claimedBy){
      const colHex=pcHex(state.characterSelections?.[rs.claimedBy]?.colour);
      el.style.stroke=colHex;
      el.style.strokeWidth="11";
      el.style.strokeOpacity="1";
      el.classList.add("route-claimed");
      return;
    }

    // Check eligibility

        el.style.cursor="pointer";
        el.style.strokeOpacity="1";

  renderCostBadges(state);
  renderTargetPulse(state);
  renderMysteryNodes(state);

}

// ─── Animate token ────────────────────────────────────────────────────────────
function animateToken(id, routeId, from, to) {
  return new Promise(resolve=>{
    const el=G.svg.querySelector(`#${CSS.escape(routeId)}`);
    const tok=G.svg.querySelector(`#tok-${id}`);
    if(!el||!tok||!el.getTotalLength){resolve();return;}
    const tot=el.getTotalLength(),sp=el.getPointAtLength(0),ep=el.getPointAtLength(tot);
    const fc=nodeCenter(from),tc=nodeCenter(to);
    const fwd=Math.hypot(sp.x-fc.x,sp.y-fc.y)<Math.hypot(ep.x-fc.x,ep.y-fc.y);
    const t0=performance.now();
    (function step(now){
      const t=Math.min(1,(now-t0)/800),e=t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
      const p=fwd?e:1-e,pt=el.getPointAtLength(tot*p);
      tok.setAttribute("transform",`translate(${pt.x},${pt.y})`);
      if(t<1) requestAnimationFrame(step); else resolve();
    })(t0);
  });
}

function handleRouteClick(rid, state) {
  if(!isMyTurn(state)||G.actionLock||G.drawPending) return;
  const myP=myPlayer(state); if(!myP) return;
  const rs=state.routes?.[rid]; if(!rs||rs.claimedBy) return;
  const to=otherNode(rid,myP.currentNode); if(!to) return;
  if(to===myP.previousNode) return;
  // Payment options
  const hand=toArr(state.hands?.[G.myId]||[]);
  const cost=Math.max(1,(G.rulesData.routes[rid].length||1)+(myP.routeCostBonus||0));
  const col=rs.colour;
  const cc=hand.filter(c=>c===col).length, rc=hand.filter(c=>c==="rainbow").length;
  const opts=[];
  const minR=Math.max(0,cost-cc), maxR=Math.min(rc,cost);
  for(let r=minR;r<=maxR;r++){const uc=cost-r;if(uc<=cc)opts.push({col,uc,ur:r});}
  if(!opts.length){showToast("Not enough cards for this route!");return;}
  G.pendingClaim={rid,to,from:myP.currentNode};
  G.selPayment=null;
  openClaimModal(rid,col,cost,opts,state);
}

function openClaimModal(rid,col,cost,opts,state) {

async function confirmClaim(state) {
  if(!G.pendingClaim||!G.selPayment||G.actionLock) return;
  G.actionLock=true;
  closeClaimModal();
  const {rid,from,to}=G.pendingClaim, pay=G.selPayment;
  const myP=myPlayer(state);
  if(!myP){G.actionLock=false;return;}

  // Remove cards
  let hand=[...toArr(state.hands?.[G.myId]||[])];
  const spent=[...Array(pay.uc).fill(pay.col),...Array(pay.ur).fill("rainbow")];
  const rem=[...spent];
  hand=hand.filter(c=>{const i=rem.indexOf(c);if(i!==-1){rem.splice(i,1);return false;}return true;});

  // Update local state snapshot for animation
  const newRoutes={...(state.routes||{})};
  newRoutes[rid]={...newRoutes[rid],claimedBy:G.myId};
  const newPlayers={...(state.players||{})};
  newPlayers[G.myId]={...myP,currentNode:to,previousNode:from,journeyRoutes:[...(myP.journeyRoutes||[]),rid]};
  const newHands={...(state.hands||{})};
  newHands[G.myId]=hand;
  const newDiscard=[...toArr(state.discardPile||[]),...spent];

  // Animate then write
  renderRoutes({...state,routes:newRoutes});
  await animateToken(G.myId,rid,from,to);

  // Check poop trap
  const poopedNodes={...state.poopedNodes||{}};
  let poopTriggered=false;
  if(poopedNodes[to]&&poopedNodes[to]!==G.myId){
    delete poopedNodes[to];
    newPlayers[G.myId]={...newPlayers[G.myId],skipTurns:(newPlayers[G.myId].skipTurns||0)+3};
    poopTriggered=true;
  }

  // Check mystery node
  const mNodes=[...toArr(state.mysteryNodes||[])];
  const isMystery=mNodes.includes(to);

  // Check destination arrival
  const chain=toArr(myP.chain||[]);
  const idx=myP.chainIdx||0;
  const target=activeDest(myP);
  let newChainIdx=idx, completedChain=myP.completedChain||false, journeyRoutes=[...(myP.journeyRoutes||[]),rid];
  let arrivedAtDest=to===target;

  if(arrivedAtDest){
    if(to==="Didcot"&&completedChain){
      // WIN
      await writeGameState(state,{routes:newRoutes,players:newPlayers,hands:newHands,discardPile:newDiscard,poopedNodes},true);
      G.actionLock=false;
      showWinScreen(G.myId);
      return;
    }
    newChainIdx=idx+1;
    if(newChainIdx>=chain.length) completedChain=true;
    // Release journey routes
    journeyRoutes.forEach(r=>{if(newRoutes[r]){newRoutes[r]={...newRoutes[r],claimedBy:null};rerollRouteColour(newRoutes,r);}});
    journeyRoutes=[];
    newPlayers[G.myId]={...newPlayers[G.myId],chainIdx:newChainIdx,completedChain,previousNode:null,journeyRoutes:[]};
  } else {
    newPlayers[G.myId]={...newPlayers[G.myId],currentNode:to,previousNode:from,journeyRoutes};
  }

  // Mystery node rotation
  if(isMystery){
    const idx2=mNodes.indexOf(to); if(idx2!==-1) mNodes.splice(idx2,1);
    const eligible=Object.keys(G.rulesData.nodes?.[0]?{}:G.rulesData.nodes?.reduce?.((a,n)=>{a[n]=1;return a;},{})||{});
    const allNodes=G.rulesData.nodes||[];
    const excl=[...(state.playerOrder||[]).map(id=>getPlayer(state,id)?.currentNode).filter(Boolean),...DEST_POOL,G.rulesData.startNode||"Didcot",...mNodes];
    const pool=allNodes.filter(n=>!excl.includes(n));
    const newNode=shuf(pool)[0]; if(newNode) mNodes.push(newNode);
  }

  const nextPlayer=getNextPlayer(state);
  const updates={routes:newRoutes,players:newPlayers,hands:newHands,discardPile:newDiscard,mysteryNodes:mNodes,poopedNodes,currentPlayer:nextPlayer};
  await writeGameState(state,updates);
  G.actionLock=false;

  if(poopTriggered) showToast("💩 You stepped in poop! 3 turns skipped.");
  if(isMystery) { const ev=pickEvent(); await showEventModal(ev,state,updates); }
  if(arrivedAtDest) showDestModal(to,state);
}

function rerollRouteColour(routes,rid){
  const palette=G.rulesData.routeColours||[];
  const blocked=Object.keys(routes).filter(r=>r!==rid&&routesAdjacent(rid,r)).map(r=>routes[r].colour);
  const opts=shuf(palette.filter(c=>!blocked.includes(c)));
  routes[rid]={...routes[rid],colour:opts[0]||palette[~~(Math.random()*palette.length)]};
}

function getNextPlayer(state){
  const order=toArr(state.playerOrder); if(!order.length) return state.currentPlayer;
  const idx=order.indexOf(state.currentPlayer);
  const next=order[(idx+1)%order.length];
  const nextP=getPlayer(state,next);
  if(nextP&&(nextP.skipTurns||0)>0){
    // Consume skip turns server-side — handled in writeGameState
    return next;
  }
  return next;
}

async function writeGameState(oldState, updates, gameOver=false){
  if(!G.roomCode){
    // Solo/local — just merge into working state
    Object.assign(oldState,updates);
    if(gameOver) oldState.status="finished";
    renderAll(oldState);
    return;
  }
  const payload={...oldState,...updates,updatedAt:Date.now()};
  if(gameOver) payload.status="finished";
  // Handle skip turns for next player
  const np=payload.players?.[payload.currentPlayer];
  if(np&&(np.skipTurns||0)>0){
    np.skipTurns=(np.skipTurns||0)-1;
    payload.players[payload.currentPlayer]=np;
    // Still advance turn
    payload.currentPlayer=getNextPlayer(payload);
  }
  try{ await fbSet(dbRef(`rooms/${G.roomCode}/state`),sanitise(payload)); }
  catch(e){console.error("[DoD] write failed",e);}
}

function sanitise(obj){
  // Firebase doesn't accept undefined — strip it
  return JSON.parse(JSON.stringify(obj,(k,v)=>v===undefined?null:v));
}

// ─── Draw card ────────────────────────────────────────────────────────────────
async function doDrawCards(state) {
  if(!isMyTurn(state)||G.actionLock||G.drawPending) return;
  G.actionLock=true;
  const deck=[...toArr(state.drawPile||[])];
  const discard=[...toArr(state.discardPile||[])];
  if(!deck.length&&!discard.length){G.actionLock=false;showToast("No cards left — turn passes.");endTurnNoAction(state);return;}
  if(!deck.length){const sd=shuf(discard);deck.push(...sd);discard.length=0;}

  const cardA=deck.pop();
  let cardB=null;
  if(deck.length){if(!deck.length&&discard.length){const sd=shuf(discard);deck.push(...sd);discard.length=0;}cardB=deck.pop();}

  G.actionLock=false;
  if(!cardB){
    // One card — auto take
    const hand=[...toArr(state.hands?.[G.myId]||[]),cardA];
    const next=getNextPlayer(state);
    await writeGameState(state,{drawPile:deck,discardPile:discard,hands:{...state.hands,[G.myId]:hand},currentPlayer:next});
    return;
  }
  // Two cards — show pick UI
  G.drawPending=true;
  showDrawChoice(cardA,cardB,state,deck,discard);
}

function showDrawChoice(cardA,cardB,state,deck,discard){
  const section=$("draw-section"); if(!section) return;
  section.innerHTML=`<div class="draw-choice-wrap">
    <div class="draw-choice-lbl">Pick one card</div>
    <div class="draw-choice-cards">
      <button class="draw-choice-card ${CARD_CLASS[cardA]}" id="pick-a" style="${cardA==="yellow"||cardA==="rainbow"?"color:var(--ink)":""}">${cardA}</button>
      <button class="draw-choice-card ${CARD_CLASS[cardB]}" id="pick-b" style="${cardB==="yellow"||cardB==="rainbow"?"color:var(--ink)":""}">${cardB}</button>
    </div>
    <div style="font-size:.72rem;color:var(--muted);text-align:center">Other goes to discard</div>
  </div>`;
  const resolve=async(chosen,other)=>{
    G.drawPending=false;
    const hand=[...toArr(state.hands?.[G.myId]||[]),chosen];
    const newDiscard=[...discard,other];
    const next=getNextPlayer(state);
    await writeGameState(state,{drawPile:deck,discardPile:newDiscard,hands:{...state.hands,[G.myId]:hand},currentPlayer:next});
    restoreDrawBtn();
  };
  $("pick-a").onclick=()=>resolve(cardA,cardB);
  $("pick-b").onclick=()=>resolve(cardB,cardA);
}

function restoreDrawBtn(){
  const section=$("draw-section"); if(!section) return;
  section.innerHTML=`<button id="draw-btn" class="btn-draw" type="button" onclick="App.draw()">
    <span class="btn-draw-l1">DRAW</span>
    <span class="btn-draw-l2">CARDS</span>
  </button>`;
}

  const next=getNextPlayer(state);
  await writeGameState(state,{currentPlayer:next});
}

function pickEvent(){

  return evs[~~(Math.random()*evs.length)]||{id:"oh_whups",title:"OH WHUPS",body:"Lost half your cards.",emoji:"😬"};

function showEventModal(event,state,updatedState){
  return new Promise(resolve=>{
    const ov=$("modal-event"); if(!ov){resolve();return;}
    $("ev-emoji").textContent=event.emoji;
    $("ev-title").textContent=event.title;
    $("ev-body").textContent=event.body;
    const extra=$("ev-extra"); extra.innerHTML="";
    ov.classList.add("open");

    const ok=$("ev-ok");
    ok.disabled=false;
    ok.textContent="OK!";

    const done=()=>{ov.classList.remove("open");applyEventEffect(event,state,updatedState);resolve();};

    switch(event.id){
      case "oh_whups": buildOhWhupsUI(extra,state,ok,done); break;
      case "bright_brown": buildBrightBrownUI(extra,state,ok,done); break;
      case "gimme_gimme": buildGimmeGimmeUI(extra,state,ok,done); break;
      case "bin_dipper": buildBinDipperUI(extra,state,ok,done); break;
      default: ok.onclick=done;
    }
  });
}

function applyEventEffect(event,state,updatedState){
  const myP=updatedState.players?.[G.myId]; if(!myP) return;
  const myHand=[...toArr(updatedState.hands?.[G.myId]||[])];
  switch(event.id){
    case "nowhere_to_poo": myP.skipTurns=(myP.skipTurns||0)+3; break;
    case "just_sniffin": myP.routeCostBonus=Math.min(2,(myP.routeCostBonus||0)+1); break;
    case "zoomies": myP.inventory=[...(myP.inventory||[]),"zoom"]; break;
    case "poop": myP.inventory=[...(myP.inventory||[]),"poop"]; break;
    case "hitch_a_lift": {
      const t=activeDest(myP);
      if(t&&t!=="Didcot"){myP.currentNode=t;myP.previousNode=null;const ch=toArr(myP.chain||[]);const idx2=myP.chainIdx||0;if(idx2+1>=ch.length)myP.completedChain=true;else myP.chainIdx=(idx2+1);(myP.journeyRoutes||[]).forEach(r=>{if(updatedState.routes?.[r]){updatedState.routes[r].claimedBy=null;rerollRouteColour(updatedState.routes,r);}});myP.journeyRoutes=[];myP.previousNode=null;}break;
    }
    case "rainbow_warrior": {
      const opps=toArr(updatedState.playerOrder||[]).filter(id=>id!==G.myId);
      let tot=0;opps.forEach(id=>{const h=toArr(updatedState.hands?.[id]||[]);const rbs=h.filter(c=>c==="rainbow");updatedState.hands[id]=h.filter(c=>c!=="rainbow");myHand.push(...rbs);tot+=rbs.length;});
      updatedState.hands[G.myId]=myHand;showToast(`🌈 Swiped ${tot} rainbow card(s)!`);break;
    }
  }
  updatedState.players[G.myId]=myP;
  if(G.roomCode) fbSet(dbRef(`rooms/${G.roomCode}/state`),sanitise(updatedState)).catch(console.error);
  else renderAll(updatedState);
}

function buildOhWhupsUI(extra,state,ok,done){
  const hand=toArr(state.hands?.[G.myId]||[]);
  const must=Math.ceil(hand.length/2);
  if(!hand.length){ok.onclick=done;return;}
  const sel=new Set();
  ok.disabled=true;ok.textContent=`Discard ${must} cards`;
  const cards=hand.map((col,i)=>({col,i}));
  const grid=mk("div"); grid.style.cssText="display:flex;flex-wrap:wrap;gap:6px;margin:10px 0";
  cards.forEach(({col,i})=>{
    const btn=mk("button",`hand-card ${CARD_CLASS[col]}`);
    btn.style.cssText="width:44px;height:62px;cursor:pointer;border-radius:8px;font-size:.65rem;position:relative;border:2px solid rgba(0,0,0,.15)";
    btn.textContent=col;
    btn.onclick=()=>{
      if(sel.has(i)){sel.delete(i);btn.style.outline="";}
      else if(sel.size<must){sel.add(i);btn.style.outline="3px solid var(--gold)";}

  extra.appendChild(grid);
  ok.onclick=()=>{
    const newHand=hand.filter((_,i)=>!sel.has(i));
    const spend=hand.filter((_,i)=>sel.has(i));
    state.hands[G.myId]=newHand;
    state.discardPile=[...toArr(state.discardPile||[]),...spend];
    done();
  };
}

      <div style="display:flex;gap:24px;flex-wrap:wrap">
        <div><div class="lobby-section-label">Players (2–6)</div><div class="lobby-num-row" id="lplayers"></div></div>
        <div><div class="lobby-section-label">Destinations each</div><div class="lobby-num-row" id="ljourneys"></div></div>
        <div><div class="lobby-section-label">Mystery boxes</div><div class="lobby-num-row" id="lmystery"></div></div>
      </div>
      <div class="lobby-actions">
        <button class="lobby-btn-back" id="lb-back" type="button">← Menu</button>
        <button class="lobby-btn-confirm" id="lb-confirm" type="button" ${ok?"":"disabled"}>${ok?"Create room →":"Select dog + colour"}</button>
      </div>
    </div></div>`);

    const dg=$("ldogs");
    DOGS.forEach(d=>{const btn=mk("button","lobby-dog-btn"+(sel.dog===d.id?" sel":""));btn.innerHTML=`<img src="${d.img}" alt="${d.name}" onerror="this.style.display='none'"><div class="dog-name">${d.name}</div>`;btn.onclick=()=>{sel.dog=d.id;r();};dg.appendChild(btn);});

    const cg=$("lcols");
    colNames.forEach(name=>{const hex=PLAYER_COLOURS[name],fg=contrastFor(hex);const btn=mk("button","lobby-colour-btn"+(sel.colour===name?" sel":""));btn.style.cssText=`background:${hex};color:${fg};border-color:${sel.colour===name?"var(--ink)":"transparent"}`;btn.textContent=name;btn.onclick=()=>{sel.colour=name;r();};cg.appendChild(btn);});

    renderNumPicker("lplayers",[2,3,4,5,6],sel.players,v=>{sel.players=v;r();});
    renderNumPicker("ljourneys",Array.from({length:Math.floor(pool.length/sel.players)},(_,i)=>i+1),sel.journeys,v=>{sel.journeys=v;r();},Math.floor(pool.length/sel.players));
    renderNumPicker("lmystery",[0,1,2,3,4,5,6,7,8],sel.mystery,v=>{sel.mystery=v;r();});

    $("lb-back").onclick=()=>{hideLobby();showScreen("screen-room");};
    const conf=$("lb-confirm");
    if(conf&&!conf.disabled)conf.onclick=async()=>{conf.disabled=true;conf.textContent="Creating…";try{await createRoom(sel);}catch(e){conf.disabled=false;conf.textContent="Create room →";showToast(e.message);}};
  }
  r();
}

function showJoinLobby(code,remoteState){
  const taken=Object.keys(remoteState.characterSelections||{});
  const takenCols=Object.values(remoteState.characterSelections||{}).map(v=>v.colour);
  const colNames=Object.keys(PLAYER_COLOURS);
  let sel={dog:null,colour:null};

  function r(){
    const ok=sel.dog&&sel.colour;
    showLobby(`<div class="lobby-wrap"><div class="lobby-inner">
      <div class="lobby-header"><div class="lobby-eyebrow">Joining room ${code}</div>
      <div class="lobby-title">JOIN GAME</div>
      <div class="lobby-game-info">
        <span class="lobby-info-pill">${remoteState.playerCount} players</span>
        <span class="lobby-info-pill">${remoteState.journeyTarget} destinations</span>
        <span class="lobby-info-pill">${remoteState.mysteryCount} mystery boxes</span>
      </div></div>
      <div><div class="lobby-section-label">Pick your dog</div><div class="lobby-dog-grid" id="ldogs"></div></div>
      <div><div class="lobby-section-label">Pick your colour</div><div class="lobby-colour-grid" id="lcols"></div></div>
      <div id="join-err" style="color:var(--red);font-size:.85rem;min-height:18px;text-align:center"></div>
      <div class="lobby-actions">
        <button class="lobby-btn-back" id="lb-back" type="button">← Menu</button>
        <button class="lobby-btn-confirm" id="lb-confirm" type="button" ${ok?"":"disabled"}>${ok?"Join room →":"Select dog + colour"}</button>
      </div>
    </div></div>`);

    const dg=$("ldogs");
    DOGS.forEach(d=>{
      const isTaken=taken.includes(d.id);
      const btn=mk("button","lobby-dog-btn"+(isTaken?" taken":"")+(sel.dog===d.id?" sel":""));
      btn.innerHTML=`<img src="${d.img}" alt="${d.name}" onerror="this.style.display='none'"><div class="dog-name">${d.name}</div>${isTaken?`<div class="taken-stamp">✕</div>`:""}`;
      if(!isTaken) btn.onclick=()=>{sel.dog=d.id;r();};
      dg.appendChild(btn);
    });

    const cg=$("lcols");
    colNames.forEach(name=>{
      const isTaken=takenCols.includes(name);
      const hex=PLAYER_COLOURS[name],fg=contrastFor(hex);
      const btn=mk("button","lobby-colour-btn"+(isTaken?" taken":"")+(sel.colour===name?" sel":""));
      btn.style.cssText=`background:${isTaken?"#ccc":hex};color:${isTaken?"#888":fg};border-color:${sel.colour===name?"var(--ink)":"transparent"};${isTaken?"text-decoration:line-through":""};`;
      btn.textContent=name;
      if(!isTaken) btn.onclick=()=>{sel.colour=name;r();};
      cg.appendChild(btn);
    });

    $("lb-back").onclick=()=>{hideLobby();showScreen("screen-room");};
    const conf=$("lb-confirm");
    if(conf&&!conf.disabled)conf.onclick=async()=>{
      conf.disabled=true;conf.textContent="Checking…";
      // Race condition check
      const snap=await fbGet(dbRef(`rooms/${code}/state`));
      const fresh=snap.val()||{};
      const nowTaken=Object.keys(fresh.characterSelections||{});
      if(nowTaken.includes(sel.dog)){$("join-err").textContent="That dog was just taken!";conf.disabled=false;conf.textContent="Join room →";sel.dog=null;r();return;}
      try{await joinRoom(code,sel,fresh);}catch(e){conf.disabled=false;conf.textContent="Join room →";showToast(e.message);}
    };
  }
  r();
}

function showWaitingLobby(code,state){
  const total=state.playerCount||2;
  const entries=Object.entries(state.characterSelections||{}).sort((a,b)=>(a[1].joinOrder||0)-(b[1].joinOrder||0));
  const joined=entries.length;
  const isCreator=state.createdBy===G.myId;

  showLobby(`<div class="lobby-wrap"><div class="lobby-inner">
    <div class="lobby-header">
      <div class="lobby-eyebrow">Share this code with friends</div>
      <div class="lobby-waiting-code">${code}</div>
    </div>
    <div class="lobby-waiting-slots" id="wslots"></div>
    <div class="lobby-waiting-sub" id="wsub">${joined}/${total} players joined</div>
    <div class="waiting-dots" style="justify-content:center"><div class="waiting-dot"></div><div class="waiting-dot"></div><div class="waiting-dot"></div></div>
    ${isCreator&&joined>=total?`<button class="lobby-start-btn" id="start-btn" type="button">🚀 Start game!</button>`:""}
    ${isCreator&&joined<total?`<div style="font-size:.82rem;color:var(--muted);text-align:center">Waiting for ${total-joined} more player${total-joined!==1?"s":""}…</div>`:`<div style="font-size:.82rem;color:var(--muted);text-align:center">Waiting for host to start…</div>`}
    <div style="text-align:center;margin-top:16px"><button class="lobby-btn-back" id="lb-back" type="button">← Menu</button></div>
  </div></div>`);

  const sc=$("wslots");
  for(let i=0;i<total;i++){
    const entry=entries[i];
    if(entry){
      const [id,data]=entry;
      const dog=DOGS.find(d=>d.id===id);
      const colHex=PLAYER_COLOURS[data.colour]||"#888",fg=contrastFor(colHex);
      const slot=mk("div","lobby-slot-filled");
      slot.style.cssText=`background:${colHex};border-color:${colHex};color:${fg}`;
      slot.innerHTML=`<img src="${dog?.img||""}" alt="${id}"><div>${dog?.name||id}</div>${data.joinOrder===0?`<div class="lobby-slot-badge">HOST</div>`:""}${id===G.myId?`<div class="lobby-slot-badge">YOU</div>`:""}`;
      sc.appendChild(slot);
    } else {
      const slot=mk("div","lobby-slot-empty");
      slot.innerHTML=`<div class="waiting-dots" style="margin-bottom:4px"><div class="waiting-dot"></div><div class="waiting-dot"></div><div class="waiting-dot"></div></div><div>Waiting…</div>`;
      sc.appendChild(slot);
    }
  }

  $("lb-back").onclick=()=>doReturnToMenu();
  if($("start-btn")) $("start-btn").onclick=async()=>{ await fbSet(dbRef(`rooms/${code}/state/phase`),"countdown"); };
}

function showCountdownLobby(code,n){
  showLobby(`<div class="lobby-wrap" style="align-items:center;justify-content:center;min-height:100vh"><div class="lobby-inner" style="text-align:center">
    <div class="lobby-eyebrow">Get ready!</div>
    <div id="cdown-num" style="font-family:var(--font-display);font-size:12rem;line-height:1;color:var(--red);text-shadow:4px 4px 0 var(--red2)">${n}</div>
  </div></div>`);
}

// ─── Room creation / joining ──────────────────────────────────────────────────
async function createRoom(sel){
  const pool=G.rulesData?.destinationPool||DEST_POOL;
  const shuffled=shuf(pool);
  const N=sel.journeys;
  const allNodes=G.rulesData?.nodes||[];
  const mCount=Math.min(sel.mystery,8);
  const nonDest=allNodes.filter(n=>n!=="Didcot"&&!pool.includes(n));
  const mysteryNodes=shuf(nonDest).slice(0,mCount);
  const routeIds=Object.keys(G.rulesData?.routes||{});
  const routes={};
  const rCols=G.rulesData?.routeColours||[];
  shuf(routeIds).forEach(id=>{
    const blocked=Object.keys(routes).filter(o=>routesAdjacent(id,o)).map(o=>routes[o].colour);
    const opts=shuf(rCols.filter(c=>!blocked.includes(c)));
    routes[id]={colour:opts[0]||rCols[0],claimedBy:null};
  });
  const deck=buildDeck();
  const hands={};
  const startHand=deck.splice(0,4);
  hands[sel.dog]=startHand;
  const state={
    phase:"waiting",
    playerCount:sel.players,
    journeyTarget:N,
    mysteryCount:mCount,
    createdBy:sel.dog,
    currentPlayer:null,
    playerOrder:[],
    characterSelections:{[sel.dog]:{colour:sel.colour,joinOrder:0}},
    players:{[sel.dog]:{currentNode:"Didcot",previousNode:null,chain:shuffled.slice(0,N),chainIdx:0,completedChain:false,journeyRoutes:[],inventory:[],skipTurns:0,routeCostBonus:0}},
    hands,
    drawPile:deck,
    discardPile:[],
    routes,
    mysteryNodes,
    poopedNodes:{},
    destPool:shuffled,
    updatedAt:Date.now()
  };

  let code,attempts=0;
  while(attempts<10){ code=genCode(); const ex=await fbGet(dbRef(`rooms/${code}/state`)); if(!ex.exists()) break; attempts++; }
  await fbSet(dbRef(`rooms/${code}/state`),sanitise(state));
  G.roomCode=code; G.myId=sel.dog;
  sessionStorage.setItem("dod_room",code); sessionStorage.setItem("dod_id",sel.dog);
  startRoomSubscriber(code);
}

async function joinRoom(code,sel,remoteState){
  const joined=Object.keys(remoteState.characterSelections||{}).length;
  const N=remoteState.journeyTarget||3;
  const pool=toArr(remoteState.destPool||[]);
  const chain=pool.slice(joined*N,(joined+1)*N);
  const deck=[...toArr(remoteState.drawPile||[])];
  const startHand=deck.splice(0,4);
  const updates={
    [`characterSelections/${sel.dog}`]:{colour:sel.colour,joinOrder:joined},
    [`players/${sel.dog}`]:{currentNode:"Didcot",previousNode:null,chain,chainIdx:0,completedChain:false,journeyRoutes:[],inventory:[],skipTurns:0,routeCostBonus:0},
    [`hands/${sel.dog}`]:startHand,
    drawPile:deck,
    updatedAt:Date.now()
  };
  await fbUpdate(dbRef(`rooms/${code}/state`),sanitise(updates));
  G.roomCode=code; G.myId=sel.dog;
  sessionStorage.setItem("dod_room",code); sessionStorage.setItem("dod_id",sel.dog);
  startRoomSubscriber(code);
}

// ─── Room subscriber ──────────────────────────────────────────────────────────
let _roomUnsub=null;
let _countdownActive=false;
let _gameActive=false;

function startRoomSubscriber(code){
  if(_roomUnsub){_roomUnsub();_roomUnsub=null;}
  _roomUnsub=fbOnValue(dbRef(`rooms/${code}/state`),snap=>{
    if(!snap.exists()) return;
    const raw=snap.val();
    const state=normalise(raw);
    switch(state.phase){
      case "waiting": showWaitingLobby(code,state); break;
      case "ready":   showWaitingLobby(code,state); if(state.createdBy===G.myId&&Object.keys(state.characterSelections||{}).length>=state.playerCount) fbSet(dbRef(`rooms/${code}/state/phase`),"countdown"); break;
      case "countdown": runCountdown(code,state); break;
      case "playing": launchGame(code,state); break;
    }
    // Auto-advance from waiting to ready when full
    if(state.phase==="waiting"&&state.createdBy===G.myId){
      const joined=Object.keys(state.characterSelections||{}).length;
      if(joined>=state.playerCount) fbSet(dbRef(`rooms/${code}/state/phase`),"ready");
    }
  });
}

function runCountdown(code,state){
  if(_countdownActive) return;
  _countdownActive=true;
  let n=3; showCountdownLobby(code,n);
  const tick=setInterval(()=>{
    n--;
    const el=$("cdown-num"); if(el) el.textContent=n;
    if(n<=0){
      clearInterval(tick);_countdownActive=false;
      if(state.createdBy===G.myId){
        // Creator sets player order and launches
        const order=shuf(Object.keys(state.characterSelections||{}));
        fbUpdate(dbRef(`rooms/${code}/state`),{playerOrder:order,currentPlayer:order[0],phase:"playing"});
      }
    }
  },1000);
}

function launchGame(code,rawState){
  if(_gameActive) return;
  _gameActive=true;
  hideLobby();
  const state=normalise(rawState);
  showScreen("screen-game");
  wireRouteClicks(state);
  renderAll(state);
  const mine=isMyTurn(state);
  const dog=DOGS.find(d=>d.id===G.myId);
  showBanner(mine?`🐾 Your turn, ${dog?.name||G.myId}!`:`${DOGS.find(d=>d.id===state.currentPlayer)?.name||state.currentPlayer}'s turn`);
  // Hand off to live game subscriber
  if(_roomUnsub){_roomUnsub();_roomUnsub=null;}
  _roomUnsub=fbOnValue(dbRef(`rooms/${code}/state`),snap=>{
    if(!snap.exists()) return;
    const s=normalise(snap.val());
    const wasMyTurn=isMyTurn(s);
    renderAll(s);
    renderDrawBtn(s);
    if(!G.drawPending) restoreDrawBtn();
    if(s.status==="finished"){ showWinScreen(s.winner||G.myId); return; }
    const prevPlayer=s._prevPlayer;
    if(s.currentPlayer!==prevPlayer){
      const mine2=s.currentPlayer===G.myId;
      const d=DOGS.find(d=>d.id===s.currentPlayer);
      showBanner(mine2?`🐾 Your turn, ${d?.name||s.currentPlayer}!`:`${d?.name||s.currentPlayer}'s turn`);
      wireRouteClicks(s);
    }
  });
}

function normalise(raw){
  if(!raw) return {};
  const s={...raw};
  s.drawPile=toArr(s.drawPile);
  s.discardPile=toArr(s.discardPile);
  s.mysteryNodes=toArr(s.mysteryNodes);
  s.playerOrder=toArr(s.playerOrder);
  if(!s.poopedNodes) s.poopedNodes={};
  if(!s.characterSelections) s.characterSelections={};
  if(s.destPool) s.destPool=toArr(s.destPool);
  if(s.players) Object.keys(s.players).forEach(id=>{
    const p=s.players[id];
    p.hand=toArr(p.hand);
    p.chain=toArr(p.chain);
    p.journeyRoutes=toArr(p.journeyRoutes);
    p.completedDestinations=toArr(p.completedDestinations||[]);
    p.inventory=toArr(p.inventory||[]);
    if(!p.skipTurns) p.skipTurns=0;
    if(!p.routeCostBonus) p.routeCostBonus=0;
  });
  if(s.hands) Object.keys(s.hands).forEach(id=>{s.hands[id]=toArr(s.hands[id]);});
  return s;
}

// ─── Return to menu ───────────────────────────────────────────────────────────
function doReturnToMenu(){
  if(_roomUnsub){_roomUnsub();_roomUnsub=null;}
  cleanup();
  G.roomCode=null; G.myId=null; G.actionLock=false; G.drawPending=false;
  _countdownActive=false; _gameActive=false;
  sessionStorage.removeItem("dod_room"); sessionStorage.removeItem("dod_id");
  hideLobby();
  const wo=$("win-overlay"); if(wo) wo.classList.remove("active");
  showScreen("screen-room");
}

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init(){
  await initFirebase();

  // Load data
  try {
    const [game,evts] = await Promise.all([
      fetch("data/didcot-dogs-game.v1.json").then(r=>r.json()),
      fetch("data/didcot-dogs-events.v1.json").then(r=>r.json())
    ]);
    const finalDest = game.winCondition?.finalDestination||"Didcot";
    game.destinationPool = Object.keys(game.destinations||{}).filter(k=>k!==finalDest);
    G.rulesData = game;
    G.destData  = {destinations: game.destinations};
    G.eventsData = evts;
    console.log("[DoD] Data loaded. Routes:",Object.keys(game.routes||{}).length);
  } catch(e){ console.error("[DoD] Data load failed:",e); }

  // Load SVG
  try {
    const txt = await fetch("assets/didcot-dogs-board.v1.svg").then(r=>r.text());
    const host=$("board-svg-host"); host.innerHTML=txt;
    const svg=host.querySelector("svg");
    svg.removeAttribute("width"); svg.removeAttribute("height");
    svg.setAttribute("preserveAspectRatio","xMidYMid meet");
    svg.style.cssText="width:100%;height:100%;display:block;background:transparent";
    G.svg=svg;
    // Compute viewBox bounds
    try{const vb=svg.viewBox.baseVal;G.boardView.base={x:vb.x,y:vb.y,w:vb.width,h:vb.height};}catch(e){}
    // Wire route clicks (will be re-wired on game start)
    setupGestures();
    console.log("[DoD] SVG loaded");
  } catch(e){ console.error("[DoD] SVG load failed:",e); }

  // Wire room buttons
  $("room-create-btn").onclick=()=>showCreateLobby2();
  const ji=$("room-join-input"), jb=$("room-join-btn"), je=$("room-error");
  ji.oninput=()=>{ji.value=ji.value.toUpperCase().replace(/[^A-Z0-9]/g,"");};
  ji.onkeydown=e=>{if(e.key==="Enter")jb.click();};
  jb.onclick=async()=>{
    const code=ji.value.trim().toUpperCase();
    if(code.length!==4){je.textContent="Enter a 4-character code";return;}
    jb.disabled=true;jb.textContent="Joining…";je.textContent="";
    try{
      const snap=await fbGet(dbRef(`rooms/${code}/state`));
      if(!snap.exists()){je.textContent="Room not found";jb.disabled=false;jb.textContent="Join";return;}
      const s=snap.val();
      if(s.phase!=="waiting"){je.textContent="Game already started";jb.disabled=false;jb.textContent="Join";return;}
      const joined=Object.keys(s.characterSelections||{}).length;
      if(joined>=s.playerCount){je.textContent="Room is full";jb.disabled=false;jb.textContent="Join";return;}
      G.roomCode=code;
      jb.disabled=false;jb.textContent="Join";
      showJoinLobby(code,normalise(s));
    } catch(e){je.textContent=e.message;jb.disabled=false;jb.textContent="Join";}
  };

  // Wire modals
  $("claim-cancel-btn").onclick=closeClaimModal;
  $("claim-confirm-btn").onclick=async()=>{
    // Need current state — fetch from Firebase or use last known
    if(!G.roomCode){console.warn("No room for confirm");return;}
    const snap=await fbGet(dbRef(`rooms/${G.roomCode}/state`));
    const s=normalise(snap.val());
    await confirmClaim(s);
  };
  $("dest-m-ok").onclick=()=>$("modal-dest").classList.remove("open");
  $("win-play-again").onclick=doReturnToMenu;

  // Session resume
  const savedCode=sessionStorage.getItem("dod_room"), savedId=sessionStorage.getItem("dod_id");
  if(savedCode&&savedId){
    try{
      const snap=await fbGet(dbRef(`rooms/${savedCode}/state`));
      if(snap.exists()){
        const s=normalise(snap.val());
        if(s.phase==="playing"&&s.characterSelections?.[savedId]){
          G.roomCode=savedCode; G.myId=savedId;
          launchGame(savedCode,s); return;
        }
      }
    } catch(e){}
    sessionStorage.removeItem("dod_room"); sessionStorage.removeItem("dod_id");
  }

  // Fullscreen
  $("fs-btn")?.addEventListener("click",async()=>{
    if(!document.fullscreenElement) await document.documentElement.requestFullscreen().catch(()=>{});
    else await document.exitFullscreen().catch(()=>{});
  });

  initFallingDogs();
  showScreen("screen-room");
  console.log("[DoD] Init complete");
}

window.App = { draw: ()=>{ if(!G.roomCode){console.warn("No room");return;} fbGet(dbRef(`rooms/${G.roomCode}/state`)).then(s=>doDrawCards(normalise(s.val()))).catch(console.error); } };

document.addEventListener("DOMContentLoaded",init);

</script>
