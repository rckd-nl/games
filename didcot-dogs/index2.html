<!DOCTYPE html>
<html lang="en">
<head>
<!--
  DOGS OF DIDCOT
  ================================================
  Version: v3.0  |  Turn: 6
  ================================================
  CHANGELOG
  v3.0 (turn 6)
    - Cleaned HTML — removed dead nodes from earlier builds
    - Dead hero-overlay (Eric/Tango hardcode) removed
    - Dead static waiting-screen content removed
    - Hardcoded start-toast "YOU ARE ERIC!" removed
    - Lobby system (showCreateLobby/showJoinLobby) drives
      all screens dynamically via #lobby-overlay
    - Firebase config in app.v2.js updated to
      dogs-of-didcot-27ae6
    - Professor Minty via Typekit (only external dependency)
    - SVG, data, and images still loaded from assets/ data/
  ================================================
-->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Dogs of Didcot</title>
<link rel="stylesheet" href="https://use.typekit.net/gff4ipy.css">
<link rel="stylesheet" href="./css/didcot-dogs.v2.css" />
<link rel="stylesheet" href="./css/room.css" />
</head>
<body>
  <div id="app">
    <div id="game-shell">

      <!-- ROOM SCREEN
           Default state. JS: wireRoomButtons() wires the two
           buttons. showCreateLobby() / showJoinLobby() append
           #lobby-overlay to #game-shell and hide this screen. -->
      <div id="room-screen" class="active">
        <div class="room-loop">
          <div class="hero-wipe hero-wipe-a"></div>
          <div class="hero-wipe hero-wipe-b"></div>
          <div class="hero-wipe hero-wipe-c"></div>
          <div class="hero-noise"></div>
        </div>
        <div class="room-inner">
          <div class="room-kicker">Didcot Dogs</div>
          <div class="room-title">PLAY</div>
          <button id="room-create-btn" type="button">Create game</button>
          <div class="room-or">or join a game</div>
          <div class="room-join-wrap">
            <input id="room-join-input" type="text" maxlength="4" placeholder="CODE"
              autocomplete="off" autocorrect="off" spellcheck="false" />
            <button id="room-join-btn" type="button">Join</button>
          </div>
          <div id="room-error"></div>
        </div>
      </div>

      <!-- RESUMING SCREEN
           Shown briefly during session restore from sessionStorage.
           JS: showScreen("resuming-screen") / hideScreen("resuming-screen") -->
      <div id="resuming-screen">
        <div class="resuming-inner">
          <div class="resuming-title">Resuming game&#8230;</div>
          <div class="waiting-dots">
            <div class="waiting-dot"></div>
            <div class="waiting-dot"></div>
            <div class="waiting-dot"></div>
          </div>
        </div>
      </div>

      <!-- ROUTE MODAL
           Payment UI for claiming a route.
           JS: openRouteModal() / closeRouteModal() -->
      <div id="route-modal-overlay" class="route-modal-overlay">
        <div id="route-modal" class="route-modal">
          <div class="route-modal-header">
            <div id="route-modal-title" class="route-modal-title">Route</div>
            <button id="route-modal-close" class="route-modal-close" type="button" aria-label="Close">&times;</button>
          </div>
          <div id="route-modal-subtitle" class="route-modal-subtitle">Choose how to play this route.</div>
          <div id="route-modal-body" class="route-modal-body"></div>
          <div class="route-modal-actions">
            <button id="route-modal-cancel" class="action-btn subtle" type="button">Cancel</button>
            <button id="route-modal-confirm" class="action-btn primary" type="button" disabled>Confirm</button>
          </div>
        </div>
      </div>

      <!-- DESTINATION REVEAL MODAL
           Shown when a new destination unlocks.
           JS: openDestinationReveal() / closeDestinationReveal() -->
      <div id="destination-reveal-overlay" class="destination-reveal-overlay">
        <div class="destination-reveal-card">
          <div id="destination-reveal-title" class="destination-reveal-title">Destination</div>
          <div id="destination-reveal-body" class="destination-reveal-body">Description</div>
          <button id="destination-reveal-close" class="action-btn primary" type="button">Continue</button>
        </div>
      </div>

      <!-- TOP BAR (desktop only, hidden on mobile via CSS) -->
      <div id="top-bar">
        <div id="title-block">
          <div id="game-title">Didcot Dogs</div>
          <div id="game-subtitle">A quirky route game around Didcot</div>
        </div>
        <button id="fullscreen-btn" type="button">Full screen</button>
      </div>

      <!-- MOBILE HUD
           Hidden until showMobileHud() is called after game launch.
           Grid layout: see didcot-dogs.v2.css #mobile-hud rules. -->
      <div id="mobile-hud">
        <div id="mobile-hud-turn" class="mobile-hud-pill">&#8212;</div>
        <div id="mobile-hud-draw" class="mobile-hud-pile"></div>
        <div id="mobile-hud-discard" class="mobile-hud-pile"></div>
        <div id="mobile-hud-destination" class="mobile-hud-pill">Target: &#8212;</div>
        <button id="mobile-menu-btn" class="mobile-hud-btn mobile-hud-btn-menu" type="button">&#8592; Menu</button>
        <button id="mobile-open-sheet-btn" class="mobile-hud-btn" type="button">Draw card</button>
        <button id="mobile-reset-view-btn" class="mobile-hud-btn" type="button">Routes</button>
      </div>

      <!-- MOBILE SHEET
           Slide-up panel for hand / destinations on mobile.
           JS: openMobileSheet() / closeMobileSheet() / toggleMobileSheet() -->
      <div id="mobile-sheet">
        <button id="mobile-sheet-handle" type="button" aria-label="Toggle mobile panel"></button>
        <div id="mobile-sheet-content">
          <div id="mobile-sheet-summary"></div>
          <div id="mobile-sheet-selected-route"></div>
          <div id="mobile-sheet-actions"></div>
          <div id="mobile-sheet-hand"></div>
          <div id="mobile-sheet-destination"></div>
        </div>
      </div>

      <!-- LEFT PANEL (desktop, hidden on mobile via CSS)
           Turn badge, card pile visuals, hand, draw button.
           Note: draw-card-btn section innerHTML may be replaced
           by renderCardDrawChoice() with the pick-one UI. -->
      <aside id="left-panel">
        <div class="panel-title">Turn</div>

        <div class="panel-section">
          <div id="turn-player-badge" class="player-badge">&#8212; to play</div>
        </div>

        <div class="panel-section desktop-piles-row">
          <div id="desktop-draw-pile" class="desktop-pile-wrap"></div>
          <div id="desktop-discard-pile" class="desktop-pile-wrap"></div>
        </div>

        <!-- Hidden count elements — used by renderCounts() -->
        <div style="display:none">
          <div id="draw-pile-count">0</div>
          <div id="discard-pile-count">0</div>
        </div>

        <div class="panel-section">
          <div class="mini-heading">Your hand</div>
          <div id="active-hand" class="hand-grid"></div>
        </div>

        <!-- Hidden — used by renderSelectedRouteCard() -->
        <div style="display:none">
          <div id="selected-route-card" class="selected-route-card"></div>
        </div>

        <!-- Draw button section — JS may replace this section's
             innerHTML with draw-choice-wrap during draw-2-pick-1.
             restoreDrawButton() recreates it after choice resolves. -->
        <div class="panel-section">
          <button id="draw-card-btn" class="action-btn primary draw-card-btn-big" type="button">
            <span class="draw-btn-line1">DRAW</span>
            <span class="draw-btn-line2">CARDS</span>
          </button>
        </div>

        <!-- Debug panel — hidden, toggled by footer button -->
        <div style="display:none"><div id="left-debug-inner"></div></div>

        <button id="reset-local-btn" class="action-btn subtle" style="display:none" type="button">Reset</button>
      </aside>

      <!-- BOARD
           #board-svg-host receives inline SVG from injectBoardSvg().
           Pan/zoom via setupMobileBoardGestures(). -->
      <main id="board-wrap">
        <div id="board-svg-host" aria-label="Didcot Dogs board"></div>
      </main>

      <!-- RIGHT PANEL (desktop, hidden on mobile via CSS)
           Player summaries and destination sequence cards. -->
      <aside id="right-panel">
        <div class="panel-title">Journey Cards</div>
        <div class="panel-section">
          <div id="player-summary-wrap" class="player-summary-wrap"></div>
        </div>
        <div class="panel-section">
          <div id="destination-sequences" class="destination-sequences"></div>
        </div>
      </aside>

      <!-- Status chip (desktop only, hidden on mobile via CSS) -->
      <div id="status-chip">Loading board&#8230;</div>

      <!-- DESKTOP FOOTER
           Room code, player identity, turn indicator, debug toggle. -->
      <div id="desktop-footer">
        <div id="desktop-footer-left">
          <div id="desktop-identity"></div>
        </div>
        <div id="desktop-footer-centre">
          <div id="desktop-turn-indicator" class="desktop-turn-indicator"></div>
        </div>
        <div id="desktop-footer-right">
          <button id="menu-btn" class="footer-btn" type="button">&#8592; Menu</button>
          <button id="debug-toggle-btn" class="footer-btn footer-btn-subtle" type="button">Version info &#9662;</button>
          <div id="left-debug" class="left-debug-hidden desktop-debug-popup"></div>
        </div>
      </div>

    </div><!-- /game-shell -->
  </div><!-- /app -->

  <!--
    Mobile bottom bar is injected into the DOM by
    injectMobileBottomBar() in app.v2.js — no static element needed.

    Dynamic overlays appended to #game-shell by JS:
      #lobby-overlay    — create/join/waiting/ready/countdown screens
      #identity-card    — "YOU ARE [name]" flash after game launch
      #mystery-modal-overlay — mystery box events and quit confirm
      #mobile-toast     — brief notification toasts on mobile
      #end-screen-overlay   — win/lose celebration screen
  -->

  <script type="module" src="./js/app.v2.js?v=30"></script>
</body>
</html>
